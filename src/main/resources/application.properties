spring.application.name=mediconnect
logging.pattern.console=${CONSOLE_LOG_PATTERN:%clr(%d{HH:mm:ss.SSS}){green} %clr(%-5level){blue} %clr([%thread]){red} %clr(%logger{20}){yellow} - %clr(%msg){cyan}%n}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.datasource.url=jdbc:h2:file:~/mediconnect;AUTO_SERVER=true
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

#spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none

#spring.sql.init.mode=always
spring.jpa.show-sql=${SHOW_SQL:true}